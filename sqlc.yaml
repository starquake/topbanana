version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/migrations/"
    queries: "internal/queries/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        overrides:
          # sqlc's SQLite type inference defaults nullable INTEGER to
          # interface{}; questions.time_limit_seconds (#99) is the only
          # nullable INTEGER on the schema today and the game service
          # treats it as a *int / sql.NullInt64. Pin it explicitly so
          # the generated params and row structs stay strongly typed.
          - column: "questions.time_limit_seconds"
            go_type:
              import: "database/sql"
              type: "NullInt64"
