version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/migrations/"
    queries: "internal/queries/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        overrides:
          # sqlc's SQLite type inference defaults nullable INTEGER to
          # interface{}; the store layer treats these nullable-INTEGER
          # overrides as *int / sql.NullInt64. Pin each explicitly so the
          # generated params and row structs stay strongly typed.
          - column: "questions.time_limit_seconds"
            go_type:
              import: "database/sql"
              type: "NullInt64"
          - column: "rounds.boundary_duration_seconds"
            go_type:
              import: "database/sql"
              type: "NullInt64"
