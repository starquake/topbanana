name: Demo reset

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch: {}

jobs:
  reset:
    runs-on: ubuntu-latest
    if: vars.DEMO_DEPLOY_ENABLED == 'true'
    environment:
      name: demo
    steps:
      - name: Wipe demo data and restart
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/topbanana-demo
            # DB and media live on the named volume topbanana_demo_data. Wiping
            # with -v removes the volume; the one-off seed run recreates it and
            # populates the demo baseline before the server starts. The deploy
            # step renames the compose file to docker-compose.yml on the host,
            # so use the default filename (no -f).
            # The demo quiz archives are supplied via the bind mount written by
            # the last deploy-demo run (DEMO_SEED_ARCHIVE_DIR in the compose env).
            docker compose down -v
            docker compose run --rm topbanana-demo -seed-demo
            docker compose up -d
