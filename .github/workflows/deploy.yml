name: Deploy

on:
  workflow_run:
    workflows: ["Docker"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: staging
      url: "${{ env.SERVER_URL }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Copy docker-compose file
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deployments/demo/docker-compose.staging.yml"
          target: "~/topbanana-staging"
          strip_components: 2

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.5
        env:
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URL: ${{ secrets.GOOGLE_REDIRECT_URL }}
          # SMTP_* are optional: if none are set, the no-op mailer in
          # the app stays in place and the /admin/email diagnostics
          # page renders "disabled (no-op)". The Go config layer
          # enforces consistency (partial SMTP errors at boot).
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          # BASE_URL is the absolute URL prefix for verify / invite
          # links embedded in outbound email (#290, #318). Read from
          # vars not secrets: the value is a public URL, masking it in
          # logs is noise, and the empty-secret resolution silently
          # broke the verify-email send on staging (#489).
          BASE_URL: ${{ vars.BASE_URL }}
          # REGISTRATION_ENABLED is an env-driven toggle so the
          # operator can flip it without a redeploy. Defaults true on
          # the compose side when unset here.
          REGISTRATION_ENABLED: ${{ vars.REGISTRATION_ENABLED }}
          # ADMIN_EMAILS is the comma-separated allowlist of emails
          # promoted to admin at registration time (#446). Sourced
          # from vars not secrets - emails are not sensitive, masking
          # them in logs is noise, and an unset vars.ADMIN_EMAILS
          # resolves to an empty string that the compose default
          # backfills.
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_TAG: edge
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # appleboy/ssh-action only forwards env vars named here; missing
          # one means the script sees an empty value and the .env heredoc
          # bakes in a blank, which the compose ${VAR:?…} guard then
          # rejects on boot. Keep this list in lockstep with the env block
          # above and the .env heredoc below.
          envs: SESSION_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URL,SMTP_HOST,SMTP_PORT,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM,SMTP_TLS,BASE_URL,REGISTRATION_ENABLED,ADMIN_EMAILS,IMAGE_NAME,IMAGE_TAG,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            if [ -z "$SESSION_KEY" ]; then
              echo "ERROR: SESSION_KEY is empty or unset; refusing to deploy" >&2
              exit 1
            fi
            for var in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REDIRECT_URL; do
              if [ -z "${!var}" ]; then
                echo "ERROR: $var is empty or unset; refusing to deploy (set it as a GitHub Actions secret on the staging environment)" >&2
                exit 1
              fi
            done
            mkdir -p ~/topbanana-staging
            cd ~/topbanana-staging
            umask 077
            cat > .env <<EOF
            SESSION_KEY='${SESSION_KEY}'
            GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}'
            GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}'
            GOOGLE_REDIRECT_URL='${GOOGLE_REDIRECT_URL}'
            SMTP_HOST='${SMTP_HOST}'
            SMTP_PORT='${SMTP_PORT}'
            SMTP_USERNAME='${SMTP_USERNAME}'
            SMTP_PASSWORD='${SMTP_PASSWORD}'
            SMTP_FROM='${SMTP_FROM}'
            SMTP_TLS='${SMTP_TLS}'
            BASE_URL='${BASE_URL}'
            REGISTRATION_ENABLED='${REGISTRATION_ENABLED}'
            ADMIN_EMAILS='${ADMIN_EMAILS}'
            IMAGE_NAME='${IMAGE_NAME}'
            IMAGE_TAG='${IMAGE_TAG}'
            EOF
            mv -f docker-compose.staging.yml docker-compose.yml
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -af
            docker logout ghcr.io

      - name: Verify staging deployment
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "${{ secrets.HEALTH_URL }}" >/dev/null; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i/12 failed; retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 12 attempts (60s); failing the deploy" >&2
          exit 1

  deploy-production:
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment:
      name: production
      url: "${{ env.SERVER_URL }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Determine image tag
        id: tag
        run: |
          IMAGE_TAG="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          IMAGE_TAG="${IMAGE_TAG#v}"
          if [[ ! "$IMAGE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IMAGE_TAG="latest"
          fi
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Copy docker-compose file
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deployments/demo/docker-compose.production.yml"
          target: "~/topbanana-production"
          strip_components: 2

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.5
        env:
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URL: ${{ secrets.GOOGLE_REDIRECT_URL }}
          # SMTP_* are optional: if none are set, the no-op mailer in
          # the app stays in place and the /admin/email diagnostics
          # page renders "disabled (no-op)". The Go config layer
          # enforces consistency (partial SMTP errors at boot).
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TLS: ${{ secrets.SMTP_TLS }}
          # BASE_URL is the absolute URL prefix for verify / invite
          # links embedded in outbound email (#290, #318). Read from
          # vars not secrets: the value is a public URL, masking it in
          # logs is noise, and the empty-secret resolution silently
          # broke the verify-email send on staging (#489).
          BASE_URL: ${{ vars.BASE_URL }}
          # REGISTRATION_ENABLED is an env-driven toggle so the
          # operator can flip it without a redeploy. Defaults true on
          # the compose side when unset here.
          REGISTRATION_ENABLED: ${{ vars.REGISTRATION_ENABLED }}
          # ADMIN_EMAILS is the comma-separated allowlist of emails
          # promoted to admin at registration time (#446). Sourced
          # from vars not secrets - emails are not sensitive, masking
          # them in logs is noise, and an unset vars.ADMIN_EMAILS
          # resolves to an empty string that the compose default
          # backfills.
          ADMIN_EMAILS: ${{ vars.ADMIN_EMAILS }}
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          # appleboy/ssh-action only forwards env vars named here; missing
          # one means the script sees an empty value and the .env heredoc
          # bakes in a blank, which the compose ${VAR:?…} guard then
          # rejects on boot. Keep this list in lockstep with the env block
          # above and the .env heredoc below.
          envs: SESSION_KEY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URL,SMTP_HOST,SMTP_PORT,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM,SMTP_TLS,BASE_URL,REGISTRATION_ENABLED,ADMIN_EMAILS,IMAGE_NAME,IMAGE_TAG,GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            if [ -z "$SESSION_KEY" ]; then
              echo "ERROR: SESSION_KEY is empty or unset; refusing to deploy" >&2
              exit 1
            fi
            for var in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REDIRECT_URL; do
              if [ -z "${!var}" ]; then
                echo "ERROR: $var is empty or unset; refusing to deploy (set it as a GitHub Actions secret on the production environment)" >&2
                exit 1
              fi
            done
            mkdir -p ~/topbanana-production
            cd ~/topbanana-production
            umask 077
            cat > .env <<EOF
            SESSION_KEY='${SESSION_KEY}'
            GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}'
            GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}'
            GOOGLE_REDIRECT_URL='${GOOGLE_REDIRECT_URL}'
            SMTP_HOST='${SMTP_HOST}'
            SMTP_PORT='${SMTP_PORT}'
            SMTP_USERNAME='${SMTP_USERNAME}'
            SMTP_PASSWORD='${SMTP_PASSWORD}'
            SMTP_FROM='${SMTP_FROM}'
            SMTP_TLS='${SMTP_TLS}'
            BASE_URL='${BASE_URL}'
            REGISTRATION_ENABLED='${REGISTRATION_ENABLED}'
            ADMIN_EMAILS='${ADMIN_EMAILS}'
            IMAGE_NAME='${IMAGE_NAME}'
            IMAGE_TAG='${IMAGE_TAG}'
            EOF
            mv -f docker-compose.production.yml docker-compose.yml
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -af
            docker logout ghcr.io

      - name: Verify production deployment
        run: |
          for i in $(seq 1 12); do
            if curl -fsS "${{ secrets.HEALTH_URL }}" >/dev/null; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i/12 failed; retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 12 attempts (60s); failing the deploy" >&2
          exit 1
