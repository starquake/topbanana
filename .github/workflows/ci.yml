name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel the older run when a new push lands on the same branch / PR.
# Saves runner minutes on fixup pushes (#202).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "stable"

    # `make test-coverage` runs the full suite with -tags=integration,
    # so a separate integration step would just duplicate the work.
    # Dropped here as part of #202.
    - name: Run Tests with Coverage
      run: make test-coverage

    - name: Check Test Coverage
      uses: vladopajic/go-test-coverage@v2
      with:
        config: .testcoverage.yml

        ## when token is not specified (value '') this feature is turned off
        ## in this example badge is created and committed only for main branch
        git-token: ${{ github.ref_name == 'main' && secrets.GITHUB_TOKEN || '' }}
        ## name of branch where badges are stored
        ## ideally this should be orphan branch (see below how to create this branch)
        git-branch: badges