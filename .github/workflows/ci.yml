name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel the older run when a new push lands on the same branch / PR.
# Saves runner minutes on fixup pushes (#202).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: "stable"

    # Catch drift between internal/web/static/css/app.css and what
    # `make tailwind` would produce for the current templates +
    # tailwindcss binary version. Without this guard, a template
    # change that adds a utility class can ship without the
    # corresponding CSS, and local `make check` only catches it for
    # contributors who happen to run it. Lint lives in its own
    # golangci-lint workflow (the github-action handles caching + PR
    # annotations natively, which `make lint` does not), so the build
    # job only needs the tailwind gap-filler.
    - name: Tailwind drift check
      run: make tailwind-check

    # Catch drift between internal/queries/ and the generated
    # internal/db/ layer. `sqlc vet` (in the lint workflow) only lints
    # the queries; it does not re-run generate, so a query edited or
    # deleted without regenerating leaves stale code in internal/db/
    # that ships unnoticed. Regenerate here and fail on any diff.
    - name: sqlc drift check
      run: make sqlc-check

    # `make test-coverage` runs the full suite with -tags=integration,
    # so a separate integration step would just duplicate the work.
    # Dropped here as part of #202.
    - name: Run Tests with Coverage
      run: make test-coverage

    - name: Check Test Coverage
      uses: vladopajic/go-test-coverage@v2
      with:
        config: .testcoverage.yml

        ## when token is not specified (value '') this feature is turned off
        ## in this example badge is created and committed only for main branch
        git-token: ${{ github.ref_name == 'main' && secrets.GITHUB_TOKEN || '' }}
        ## name of branch where badges are stored
        ## ideally this should be orphan branch (see below how to create this branch)
        git-branch: badges

    # Smoke against a seeded fixture DB (#349): test-coverage's fresh
    # DB doesn't exercise migrations against populated rows, so a
    # migration that breaks on existing data slips through and only
    # surfaces at deploy time. seed-dev populates a development-shaped
    # DB; `go run ./cmd/server/ -check` then opens it, applies any
    # pending migrations, and exits — the exact code path a real
    # deploy hits before binding the listener.
    #
    # Wired as a non-required check first so a flake doesn't gate PRs
    # while the new step beds in; promote to required-checks once it's
    # been stable across a release cycle.
    - name: Smoke against seeded DB
      run: |
        make seed-dev
        make smoke