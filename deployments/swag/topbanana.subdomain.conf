# Example reverse-proxy config for Top Banana! behind linuxserver.io's SWAG
# (nginx + Let's Encrypt). Copy it into SWAG's proxy-confs directory as
# /config/nginx/proxy-confs/topbanana.subdomain.conf, then adjust server_name.
#
# Before it works:
#   - Name your Top Banana! container "topbanana" (or change $upstream_app below).
#     Put it on the same Docker network as SWAG.
#   - Point a DNS record for your subdomain at the SWAG host.
#   - On the topbanana container, set BASE_URL=https://<your-domain> so links in
#     outgoing emails resolve, and TRUSTED_PROXY_IPS to the proxy's address/CIDR
#     so the per-IP rate limiters read the real client IP.

server {
    listen 443 ssl;
#    listen 443 quic;
    listen [::]:443 ssl;
#    listen [::]:443 quic;

    server_name example.topbanana.app topbanana.*;

    include /config/nginx/ssl.conf;

    # Uploaded media can be large; leave the body uncapped here and let the app
    # enforce its own per-file upload limits.
    client_max_body_size 0;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app topbanana;
        set $upstream_port 8080;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
