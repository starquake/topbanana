services:
  topbanana-production:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: topbanana-production
    environment:
      - APP_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - DB_URI=file:/home/nonroot/data/topbanana.sqlite?_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)&_pragma=synchronous(NORMAL)&_pragma=busy_timeout(5000)
      - REGISTRATION_ENABLED=true
      - ADMIN_USERNAMES=admin
      - SESSION_KEY=${SESSION_KEY:?SESSION_KEY must be set in .env or environment}
      # Google sign-in is part of the standard production deployment.
      # All three vars are required; missing any one fails compose
      # boot loudly instead of silently rendering /login without the
      # button. The redirect URL must exactly match the entry in the
      # Google Cloud Console OAuth client.
      #
      # The values are sourced from GitHub Actions secrets on the
      # `production` environment and written into the host's .env by
      # .github/workflows/deploy.yml. Adding a new GOOGLE_* var here
      # requires three matching edits in deploy.yml's deploy-production
      # job: the `env:` block, the `envs:` allowlist, and the .env
      # heredoc. Skip any of those and appleboy/ssh-action silently
      # forwards an empty value, the heredoc bakes in a blank, and
      # this `${VAR:?…}` guard refuses the boot.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set in .env or environment}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET must be set in .env or environment}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:?GOOGLE_REDIRECT_URL must be set in .env or environment}
    volumes:
      - topbanana_production_data:/home/nonroot/data
    networks:
      - web
    restart: unless-stopped
    # Mirrors the Dockerfile HEALTHCHECK so `docker ps` reports a
    # health column and any compose-aware orchestrator (rolling
    # deploys, blue/green) has something to wait on (#344).
    healthcheck:
      test: ["CMD", "/home/nonroot/server", "-healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  topbanana_production_data:
networks:
  web:
    external: true
