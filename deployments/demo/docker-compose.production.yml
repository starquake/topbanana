services:
  topbanana-production:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: topbanana-production
    environment:
      - APP_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - DB_URI=file:/home/nonroot/data/topbanana.sqlite?_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)&_pragma=synchronous(NORMAL)&_pragma=busy_timeout(5000)
      - REGISTRATION_ENABLED=true
      - ADMIN_USERNAMES=admin
      - SESSION_KEY=${SESSION_KEY:?SESSION_KEY must be set in .env or environment}
      # Google sign-in stays off when any of the three is unset. Set all
      # three in .env to enable the "Sign in with Google" button. The
      # redirect URL must exactly match the entry in the Google Cloud
      # Console OAuth client.
      #
      # The deploy-production job in .github/workflows/deploy.yml does
      # NOT currently forward GOOGLE_* secrets from GitHub Actions to
      # the host's .env. To turn on Google sign-in for production you
      # must (1) flip the defaults below from `${VAR:-}` to
      # `${VAR:?…}` (mirroring the staging file), and (2) add the
      # three GOOGLE_* vars to the deploy-production job's `env:`
      # block, `envs:` allowlist, AND the .env heredoc. Skip step (2)
      # and appleboy/ssh-action silently forwards an empty value,
      # the heredoc bakes in a blank, and the container boots with
      # Google sign-in silently disabled.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:-}
    volumes:
      - topbanana_production_data:/home/nonroot/data
    networks:
      - web
    restart: unless-stopped
    # Mirrors the Dockerfile HEALTHCHECK so `docker ps` reports a
    # health column and any compose-aware orchestrator (rolling
    # deploys, blue/green) has something to wait on (#344).
    healthcheck:
      test: ["CMD", "/home/nonroot/server", "-healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  topbanana_production_data:
networks:
  web:
    external: true
