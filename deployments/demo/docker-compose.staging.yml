services:
  topbanana-staging:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-edge}
    container_name: topbanana-staging
    environment:
      - APP_ENV=staging
      - HOST=0.0.0.0
      - PORT=8080
      - DB_URI=file:/home/nonroot/data/topbanana.sqlite?_pragma=foreign_keys(1)&_pragma=journal_mode(WAL)&_pragma=synchronous(NORMAL)&_pragma=busy_timeout(5000)
      - REGISTRATION_ENABLED=true
      - ADMIN_USERNAMES=admin
      - SESSION_KEY=${SESSION_KEY:?SESSION_KEY must be set in .env or environment}
      # Google sign-in stays off when any of the three is unset. Set all
      # three in .env to enable the "Sign in with Google" button. The
      # redirect URL must exactly match the entry in the Google Cloud
      # Console OAuth client.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URL=${GOOGLE_REDIRECT_URL:-}
    volumes:
      - topbanana_staging_data:/home/nonroot/data
    networks:
      - web
    restart: unless-stopped

volumes:
  topbanana_staging_data:
networks:
  web:
    external: true
