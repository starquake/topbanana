<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopBanana Client</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="/client/css/synthwave.css">
    <script src="https://cdn.jsdelivr.net/npm/animejs@4.2.0/dist/bundles/anime.umd.min.js"></script>
    <script type="module" src="/client/js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <section class="section">
        <div class="container" x-data="gameApp">
            <h1 class="title">Top Banana!</h1>

            <div x-show="!gameId">
                <div x-show="!deepLinkedQuiz" class="field">
                    <label class="label" for="quiz-select">Select a Quiz</label>
                    <div class="control">
                        <div class="select">
                            <select id="quiz-select" x-model="selectedQuizId" @change="checkAlreadyPlayed()">
                                <template x-for="quiz in quizzes" :key="quiz.id">
                                    <option :value="quiz.id" x-text="quiz.title"></option>
                                </template>
                            </select>
                        </div>
                    </div>
                </div>
                <template x-if="deepLinkedQuiz">
                    <div class="content">
                        <h2 class="subtitle" x-text="deepLinkedQuiz.title"></h2>
                        <p x-text="deepLinkedQuiz.description"></p>
                    </div>
                </template>
                <template x-if="startError">
                    <div class="notification is-danger" x-text="startError"></div>
                </template>
                <button class="button is-primary" @click="startGame()" :disabled="!selectedQuizId || !!startError">Start Game</button>
            </div>

            <div x-show="gameId && !finished">
                <template x-if="question">
                    <div>
                        <progress class="progress is-primary" :value="progress" max="100"></progress>
                        <h2 class="subtitle" x-text="question.text"></h2>

                        <template x-if="question.imageUrl">
                            <figure class="image">
                                <img alt="" :src="question.imageUrl" :alt="question.text"
                                     x-show="!imageError"
                                     @error="imageError = true">
                            </figure>
                        </template>

                        <template x-if="feedback">
                            <div class="notification" :class="feedback.correct ? 'is-success' : 'is-danger'">
                                <p class="is-size-4" x-text="feedback.correct ? 'Correct! ✅' : 'Wrong! ❌'"></p>
                                <p>Score: <span x-text="feedback.score"></span></p>
                            </div>
                        </template>

                        <div class="buttons" x-show="!feedback">
                            <template x-for="option in question.options" :key="option.id">
                                <button class="button is-fullwidth" @click="submitAnswer(option.id)" x-text="option.text"></button>
                            </template>
                        </div>
                    </div>
                </template>
                <template x-if="!question">
                    <p>Loading question...</p>
                </template>
            </div>

            <div x-show="finished">
                <h2 class="subtitle">Game Finished!</h2>
                <template x-if="leaderboard">
                    <div class="content">
                        <h3>Leaderboard</h3>
                        <table class="table is-striped is-fullwidth">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Player</th>
                                    <th>Score</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="(entry, index) in leaderboard.entries" :key="entry.playerId">
                                    <tr :class="entry.isCurrentPlayer ? 'is-selected' : ''">
                                        <td x-text="index + 1"></td>
                                        <td x-text="entry.username"></td>
                                        <td x-text="entry.score"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <template x-if="!leaderboard">
                    <p>Loading leaderboard...</p>
                </template>
            </div>
        </div>
    </section>
</body>
</html>
