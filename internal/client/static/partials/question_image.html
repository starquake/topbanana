{{define "question-image"}}
<!-- The question's attached image, shared by the solo (index.html) and live
     (join.html) play surfaces. Each surface gates this with its own x-if and
     wraps it for its own layout (solo centers it in a flex spacer; live stacks
     it inline with a bottom margin), so the markup here carries no positioning.
     currentQuestion() and imageError exist on both GameApp and JoinApp. The
     image is served by GET /media/{id}, whose authz mirrors the play surface;
     imageError hides a broken image. -->
<img :src="currentQuestion().imageUrl" alt="" loading="lazy"
     data-testid="question-image"
     x-show="!imageError"
     @error="imageError = true"
     class="block mx-auto w-auto max-w-full max-h-[18vh] lg:max-h-[32vh] object-contain rounded-lg">
{{end}}
